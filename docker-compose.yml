services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartfmd
      POSTGRES_USER: smartfmd
      POSTGRES_PASSWORD: smartfmd
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfmd -d smartfmd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health -m ok || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: ["sh", "/app/backend/scripts/start_backend.sh"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: ["sh", "/app/backend/scripts/start_worker.sh"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env.example
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    command: >
      sh -c "cd /app/frontend && npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
